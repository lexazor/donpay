version: "3.9"

services:
  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: donpay
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    depends_on:
      - mysql
    environment:
      PORT: 3001
      DATABASE_URL: mysql://root:rootpassword@mysql:3306/donpay
      JWT_SECRET: change-this-secret
      JWT_REFRESH_SECRET: change-this-refresh-secret
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  mysql_data:
